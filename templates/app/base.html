<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RFPO Application{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        .navbar-brand {
            font-weight: bold;
        }
        .sidebar {
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .main-content {
            margin-left: 0;
        }
        @media (min-width: 768px) {
            .sidebar {
                position: fixed;
                top: 56px;
                left: 0;
                width: 250px;
                z-index: 1000;
            }
            .main-content {
                margin-left: 250px;
            }
        }
        .loading {
            display: none;
        }
        .alert-container {
            position: fixed;
            top: 70px;
            right: 20px;
            z-index: 1050;
            max-width: 400px;
        }
        /* Focus states for accessibility */
        a:focus-visible, button:focus-visible, input:focus-visible,
        select:focus-visible, textarea:focus-visible, .form-control:focus {
            outline: 2px solid #0d6efd;
            outline-offset: 2px;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
        }
        /* Mobile improvements */
        @media (max-width: 767.98px) {
            .sidebar {
                min-height: auto;
                position: relative !important;
                width: 100% !important;
                top: auto !important;
            }
            .main-content {
                margin-left: 0 !important;
            }
            .sidebar .nav-pills .nav-link {
                padding: 0.4rem 0.75rem;
                font-size: 0.9rem;
            }
            .table {
                font-size: 0.85rem;
            }
            .table td, .table th {
                padding: 0.35rem 0.5rem;
            }
            .card-body {
                padding: 0.75rem;
            }
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top" aria-label="Main navigation">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('dashboard') }}">
                <i class="fas fa-file-invoice"></i> RFPO
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-user"></i> <span id="username">User</span>
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="{{ url_for('profile') }}"><i class="fas fa-user-cog"></i> Profile</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid" style="margin-top: 56px;">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 sidebar p-3" role="navigation" aria-label="Sidebar navigation">
                <ul class="nav nav-pills flex-column">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" 
                           href="{{ url_for('dashboard') }}">
                            <i class="fas fa-tachometer-alt"></i> Dashboard
                        </a>
                    </li>
                    <!-- Only show RFPO/Teams links for approvers and admins -->
                    <li class="nav-item rfpo-nav-item">
                        <a class="nav-link {% if request.endpoint == 'rfpos_list' %}active{% endif %}" 
                           href="{{ url_for('rfpos_list') }}">
                            <i class="fas fa-file-invoice"></i> RFPOs
                        </a>
                    </li>
                    <li class="nav-item rfpo-nav-item">
                        <a class="nav-link {% if request.endpoint == 'teams_list' %}active{% endif %}" 
                           href="{{ url_for('teams_list') }}">
                            <i class="fas fa-users"></i> Teams
                        </a>
                    </li>
                    <li class="nav-item rfpo-nav-item">
                        <a class="nav-link" href="{{ url_for('rfpo_create') }}">
                            <i class="fas fa-plus"></i> Create RFPO
                        </a>
                    </li>
                    <li class="nav-item approver-nav-item" style="display: none;">
                        <a class="nav-link {% if request.endpoint == 'approvals' %}active{% endif %}" 
                           href="{{ url_for('approvals') }}">
                            <i class="fas fa-clipboard-check"></i> My Approvals
                            <span class="badge bg-danger ms-1 approval-count-badge" style="display: none;">0</span>
                        </a>
                    </li>
                </ul>
            </div>

            <!-- Main Content -->
            <div class="col-md-9 col-lg-10 main-content" role="main">
                <div class="p-4">
                    {% block content %}{% endblock %}
                </div>
            </div>
        </div>
    </div>

    <!-- Alert Container -->
    <div class="alert-container" id="alertContainer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Global form input trimming on submit
        document.addEventListener('submit', function(e) {
            if (e.target.tagName === 'FORM') {
                e.target.querySelectorAll('input[type="text"], input[type="email"], input[type="search"], input[type="url"], input[type="tel"], textarea').forEach(function(input) {
                    if (input.value && !input.readOnly && !input.disabled) {
                        input.value = input.value.trim();
                    }
                });
            }
        }, true);

        // Global functions
        function showAlert(message, type = 'info', timeout = 5000) {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            alertContainer.appendChild(alertDiv);
            
            if (timeout > 0) {
                setTimeout(() => {
                    alertDiv.remove();
                }, timeout);
            }
        }

        function showLoading(show = true) {
            const loadingElements = document.querySelectorAll('.loading');
            loadingElements.forEach(el => {
                el.style.display = show ? 'block' : 'none';
            });
        }

        async function makeApiCall(url, options = {}) {
            showLoading(true);
            try {
                const response = await fetch(url, {
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    },
                    ...options
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.message || 'API call failed');
                }
                
                return data;
            } catch (error) {
                showAlert(error.message, 'danger');
                throw error;
            } finally {
                showLoading(false);
            }
        }

        async function logout() {
            try {
                await makeApiCall('/api/auth/logout', { method: 'POST' });
                window.location.href = '/login';
            } catch (error) {
                // Even if API call fails, redirect to login
                window.location.href = '/login';
            }
        }

        // Check authentication status
        async function checkAuth() {
            try {
                const response = await makeApiCall('/api/auth/verify');
                if (response.authenticated && response.user) {
                    document.getElementById('username').textContent = response.user.display_name || response.user.username;
                    
                    // Configure navigation based on user type
                    const isRfpoUser = response.user.roles.includes('RFPO_USER');
                    const isRfpoAdmin = response.user.roles.includes('RFPO_ADMIN') || response.user.roles.includes('GOD');
                    const isApprover = response.user.is_approver;
                    
                    // Hide RFPO navigation for non-approver RFPO users
                    if (isRfpoUser && !isApprover && !isRfpoAdmin) {
                        const rfpoNavItems = document.querySelectorAll('.rfpo-nav-item');
                        rfpoNavItems.forEach(item => {
                            item.style.display = 'none';
                        });
                    }
                    
                    // Show approvals nav for approvers
                    if (isApprover || isRfpoAdmin) {
                        const approverNavItems = document.querySelectorAll('.approver-nav-item');
                        approverNavItems.forEach(item => {
                            item.style.display = '';
                        });
                        // Load pending count for badge
                        loadApprovalBadgeCount();
                    }
                    
                    return true;
                }
            } catch (error) {
                console.error('Auth check failed:', error);
            }
            return false;
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Only check auth on protected pages (not login page)
            if (!window.location.pathname.includes('/login')) {
                checkAuth().then(authenticated => {
                    if (!authenticated) {
                        window.location.href = '/login';
                    }
                });
            }
        });

        async function loadApprovalBadgeCount() {
            try {
                const response = await fetch('/api/users/approver-rfpos');
                const data = await response.json();
                if (data.success && data.summary && data.summary.pending > 0) {
                    const badges = document.querySelectorAll('.approval-count-badge');
                    badges.forEach(badge => {
                        badge.textContent = data.summary.pending;
                        badge.style.display = '';
                    });
                }
            } catch (e) {
                // Non-critical, ignore
            }
        }
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
