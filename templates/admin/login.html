<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFPO Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #002B5C 0%, #001a3a 100%);
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border-top: 4px solid #C8102E;
        }
        .btn-primary {
            background-color: #C8102E;
            border-color: #C8102E;
        }
        .btn-primary:hover, .btn-primary:focus {
            background-color: #a00d24;
            border-color: #a00d24;
        }
        .btn-outline-primary {
            color: #002B5C;
            border-color: #002B5C;
        }
        .btn-outline-primary:hover {
            background-color: #002B5C;
            border-color: #002B5C;
            color: #fff;
        }
        .form-control:focus {
            border-color: #002B5C;
            box-shadow: 0 0 0 0.2rem rgba(0, 43, 92, 0.2);
        }
        .admin-login-logo {
            height: 55px;
            margin-bottom: 0.5rem;
        }
        @media (max-width: 576px) {
            .login-card { margin: 1rem; padding: 1.5rem !important; }
            .admin-login-logo { height: 42px; }
        }
    </style>
</head>
<body class="d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="login-card p-4">
                    <div class="text-center mb-4">
                        <img src="{{ url_for('static', filename='rfpo_admin_logo_dark.svg') }}" alt="RFPO Admin" class="admin-login-logo">
                        <p class="text-muted">Administration Panel</p>
                    </div>

                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form method="POST" aria-label="Admin login">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-3">
                            <label for="email" class="form-label"><i class="fas fa-envelope me-1"></i> Email</label>
                            <input type="email" class="form-control" id="email" name="email" required
                                   placeholder="Enter your email" autocomplete="email">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label"><i class="fas fa-lock me-1"></i> Password</label>
                            <input type="password" class="form-control" id="password" name="password" required
                                   placeholder="Enter your password" autocomplete="current-password">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="fas fa-sign-in-alt me-1"></i> Login to Admin Panel
                        </button>
                    </form>

                    {% if saml_enabled %}
                    <div class="text-center mb-3">
                        <span class="text-muted">— or —</span>
                    </div>
                    <a href="{{ url_for('saml_login') }}" class="btn btn-outline-primary w-100 mb-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 23 23" class="me-2" style="vertical-align: text-bottom;">
                            <path fill="#f35325" d="M1 1h10v10H1z"/><path fill="#81bc06" d="M12 1h10v10H12z"/>
                            <path fill="#05a6f0" d="M1 12h10v10H1z"/><path fill="#ffba08" d="M12 12h10v10H12z"/>
                        </svg>
                        Sign in with Microsoft
                    </a>
                    {% endif %}

                    <div class="text-center">
                        <small class="text-muted">
                            RFPO Administration &bull; USCAR
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
